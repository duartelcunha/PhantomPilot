line-length = 100
target-version = "py311"

[lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "SIM", "RUF", "PTH", "C4", "PIE", "T20"]
ignore = ["E501", "B008", "SIM108"]

[lint.isort]
known-first-party = ["phantompilot"]

[lint.per-file-ignores]
"tests/**/*.py" = ["T20", "B011"]

[format]
quote-style = "double"
indent-style = "space"
